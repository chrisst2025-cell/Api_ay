<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini 2.5 Mobile Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Bouton pour ouvrir/fermer le menu sur Mobile -->
        <button class="menu-toggle" onclick="toggleSidebar()">⚙️ Options</button>

        <!-- Barre latérale coulissante -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">✨ Gemini OS</div>
                <button class="close-sidebar" onclick="toggleSidebar()">❌</button>
            </div>
            
            <div class="section-title">Configuration</div>
            <input type="password" id="api-key-input" placeholder="Clé API Gemini">
            <input type="text" id="uid-input" value="user_mobile_1" placeholder="UID Utilisateur">
            
            <button class="btn btn-danger" onclick="clearMemory()">🗑️ Effacer la mémoire</button>
            
            <hr>
            
            <div class="section-title">🔒 Espace Premium</div>
            <input type="password" id="premium-pwd" placeholder="Mot de passe Premium">
            <button class="btn btn-premium" onclick="unlockPremium()">Activer Premium</button>
            
            <div id="premium-options" class="hidden">
                <div class="section-title">🎨 Thèmes Premium</div>
                <select id="bg-selector" onchange="changeBackground()">
                    <option value="default">Par défaut</option>
                    <option value="cyberpunk">Cyberpunk Neon</option>
                    <option value="space">Espace Profond</option>
                    <option value="matrix">Matrix Code</option>
                </select>
                
                <div class="section-title">🎵 Ambiance</div>
                <button class="btn" onclick="toggleAudio()">🎧 Musique Lofi (On/Off)</button>
            </div>
        </aside>

        <!-- Zone de discussion principale -->
        <main class="chat-area">
            <div class="chat-header">
                <h2>Gemini 2.5 Flash</h2>
                <span id="premium-badge" class="badge">Gratuit</span>
            </div>
            
            <div class="messages-container" id="chat-box">
                <div class="message system-msg">Connecté avec succès. Renseigne ta clé API à gauche pour démarrer.</div>
            </div>

            <div id="image-preview-container" class="hidden">
                <img id="image-preview" src="" alt="Aperçu">
                <button onclick="removeImage()">❌</button>
            </div>

            <div class="input-container">
                <label for="image-input" class="attach-btn">🖼️</label>
                <input type="file" id="image-input" accept="image/*" style="display:none" onchange="previewFile()">
                
                <input type="text" id="user-prompt" placeholder="Message...">
                <button class="send-btn" onclick="sendMessage()">▶</button>
            </div>
        </main>
    </div>

    <audio id="lofi-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <script src="app.js"></script>
</body>
</html>
